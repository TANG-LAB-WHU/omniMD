name: Rust CI (Ubuntu 24.04)

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

env:
  CARGO_TERM_COLOR: always
  LIBTORCH_USE_PYTORCH: 1

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyTorch (CPU)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Configure LD_LIBRARY_PATH
        run: |
          LIBTORCH_PATH=$(python -c "import torch; import os; print(os.path.join(os.path.dirname(torch.__file__), 'lib'))")
          echo "LD_LIBRARY_PATH=$LIBTORCH_PATH:$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy Linting
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Test omnimd-core
        run: cargo test -p omnimd-core -- --test-threads=1

      - name: Test omnimd-sim
        run: cargo test -p omnimd-sim -- --test-threads=1

      - name: Test omnimd-input
        run: cargo test -p omnimd-input -- --test-threads=1

      - name: Run Integration Tests
        run: cargo test --tests -- --test-threads=1
